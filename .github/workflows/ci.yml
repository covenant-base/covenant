name: ci

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  public-id-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: guard tracked files
        run: bash scripts/check-forbidden-public-identifiers.sh --repo
      - name: guard branch name
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: bash scripts/check-forbidden-public-identifiers.sh --branch-name "$BRANCH_NAME"
      - name: guard pushed commits
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            SPEC="${{ github.sha }}"
          else
            SPEC="${{ github.event.before }}..${{ github.sha }}"
          fi
          bash scripts/check-forbidden-public-identifiers.sh --rev-spec "$SPEC"

  workspace:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: public-id-guard
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.31.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm contracts:build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm contracts:test
      - run: pnpm test
      - run: pnpm build
      - run: pnpm size

  rust-indexer:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: public-id-guard
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: install rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: cargo check indexer
        working-directory: services/indexer
        run: cargo check --all-targets
      - name: cargo test indexer
        working-directory: services/indexer
        run: cargo test --all-targets
